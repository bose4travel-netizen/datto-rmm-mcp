# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - dattoApiKey
      - dattoApiSecret
      - dattoPlatform
    properties:
      dattoApiKey:
        type: string
        description: Your Datto RMM API key
      dattoApiSecret:
        type: string
        description: Your Datto RMM API secret
      dattoPlatform:
        type: string
        description: "Your Datto RMM platform region (e.g., concord, pinotage, merlot, zinfandel)"
  commandFunction: |-
    (config) => ({ command: 'node', args: ['dist/index.js'], env: { DATTO_API_KEY: config.dattoApiKey, DATTO_API_SECRET: config.dattoApiSecret, DATTO_PLATFORM: config.dattoPlatform, MCP_TRANSPORT: 'stdio' } })
